[build]
# The index HTML file to drive the bundling process.
target = "webapp/index.html"
dist = "dist"

[watch]
# Paths to watch. The `build.target`'s parent folder is watched by default.
watch = [
	"webapp",
	"js",
	"data_model",
	"admin_pages",
	"order_pages",
	"report_pages",
	"timecard_pages"
]

# Builds the dynamically loaded page-module wasm binaries into
# <staging>/modules/ so they ship alongside the shell in dist.
[[hooks]]
stage = "post_build"
command = "bash"
command_arguments = ["build_modules.sh"]
